services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: namia
      POSTGRES_PASSWORD: namia_secret
      POSTGRES_DB: namia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namia -d namia"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app                  # bind mount source — edits reflect instantly
      - /app/node_modules       # anonymous vol — keeps Linux-compatible binaries
      - /app/.next              # anonymous vol — preserves Next.js build cache
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev"

volumes:
  pgdata:
